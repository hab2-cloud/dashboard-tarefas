<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
    <header>
      <h1>📋 Dashboard de Tarefas</h1>
      <p>Gerencie suas tarefas</p>
    </header>

    <div class="card">

      <div class="input-area">
        <input type="text" id="tarefaInput" placeholder="Digite uma nova tarefa...">
        <button id="btnAdicionar">Adicionar</button>
      </div>
      <div id="ocult">Por favor, coloque um valor válido</div>

      <ul id="listaTarefas"></ul>

    </div>

  </div>

  <script src="storage.js"></script>
  <script src="script.js"></script>
</body>
</html>
